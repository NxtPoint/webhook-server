services:
  # =========================================
  # 1) Main API / Upload / SportAI service
  #    Displayed on the Render dashboard as "Sport AI - API call".
  #    Custom domain: api.nextpointtennis.com
  #    The `name: webhook-server` slug below is legacy — kept so existing
  #    blueprint sync continues to map to the running service. Don't change
  #    without coordinating with Render (would create a new service).
  # =========================================
  - type: web
    name: webhook-server
    env: python
    pythonVersion: 3.12.3
    plan: starter
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 1800"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: OPS_KEY
        sync: false

      - key: SPORT_AI_TOKEN
        sync: false
      - key: SPORT_AI_BASE
        value: "https://api.sportai.com"

      - key: INGEST_REPLACE_EXISTING
        value: "1"
      - key: AUTO_INGEST_ON_COMPLETE
        value: "1"

      # marketing_crm growth stack (see marketing_crm/STATUS.md). Activated 2026-06-16
      # (pre-launch, no customers). CRM_SYNC stays off until HubSpot/Klaviyo keys are set.
      - key: TRACKING_ENABLED      # core.usage_event + page-view beacon
        value: "1"
      - key: CONSENT_ENABLED       # /api/client/consent/* + consent screens (DRAFT copy, pre-legal)
        value: "1"
      - key: FEEDBACK_ENABLED      # in-app feedback + NPS
        value: "1"
      - key: COCKPIT_ENABLED       # internal admin cockpit (/cockpit) + views
        value: "1"

      # De-Wix auth (Phase 0/1) — per-user IdP (Clerk) JWT auth in auth_v2.
      # DARK: with AUTH_V2_ENABLED=0 the legacy CLIENT_API_KEY + ?email path is
      # the only active auth, so the live Wix login is untouched. Fill the Clerk
      # values + flip to "1" only once the Clerk app exists and is tested.
      # Clerk note: tokens set `iss` (Frontend API URL) but not `aud`, so leave
      # AUTH_AUDIENCE blank; add an `email` claim via a Clerk JWT template.
      - key: AUTH_V2_ENABLED
        value: "1"          # ON: accepts per-user Clerk JWTs ALONGSIDE the legacy key (Wix unaffected)
      - key: AUTH_PROVIDER
        value: "clerk"
      # Clerk PRODUCTION instance — custom domain clerk.ten-fifty5.com (LIVE 2026-06-16,
      # pk_live_, own Google OAuth, 5/5 DNS verified). Public values (browser-exposed
      # by design). Dev instance was definite-terrapin-9.clerk.accounts.dev.
      - key: AUTH_JWKS_URL
        value: "https://clerk.ten-fifty5.com/.well-known/jwks.json"
      - key: AUTH_ISSUER
        value: "https://clerk.ten-fifty5.com"
      - key: AUTH_AUDIENCE
        value: ""           # leave blank for Clerk default session tokens
      # FEDERATION — trust NextPoint's Clerk app too, so a NextPoint member can use
      # Ten-Fifty5 embedded in the NextPoint members area WITHOUT a second login. The
      # verifier picks the JWKS by the token's `iss` and still fully verifies it. When
      # AUTH_ISSUERS is set it SUPERSEDES the single AUTH_ISSUER above (kept for rollback:
      # clear AUTH_ISSUERS to revert to Ten-Fifty5-only). JWKS URLs are positionally paired.
      - key: AUTH_ISSUERS
        value: "https://clerk.ten-fifty5.com,https://clerk.nextpointtennis.com"
      - key: AUTH_JWKS_URLS
        value: "https://clerk.ten-fifty5.com/.well-known/jwks.json,https://clerk.nextpointtennis.com/.well-known/jwks.json"

      # Direct PayPal payments (paypal_billing) — replaces Wix Pricing Plans checkout.
      # LIVE since 2026-06-16: catalog.json carries the live Billing Plan ids, the live
      # webhook is registered, and the secrets below hold live credentials. The go-live
      # state lives HERE (not the dashboard) so a blueprint sync can't wipe it.
      # ROLLBACK: set PAYPAL_ENABLED=0 → the frontend instantly falls back to the Wix
      # checkout (no deploy beyond the env change). Runbook: paypal_billing/README.md.
      - key: PAYPAL_ENABLED
        value: "1"
      - key: PAYPAL_ENV            # sandbox | live
        value: "live"
      - key: PAYPAL_CURRENCY
        value: "USD"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false

      # Serve over-emission fix (2026-06-16): retire the far-POSE serve path.
      # Proving run (T5 375198f5 vs SA 079d2c62): far-pose is pure FP on a real
      # upload — the trained model_far catches the same far serves (recall
      # 18/24 unchanged, precision 33%->60%, serves 55->30). Code default stays
      # ON so the CI bench (fixtures carry no model candidates) stays green;
      # this env makes prod correct. RULE 6 + .claude/audit_bronze_build_2026-06-16.md.
      # Rollback: set to "1".
      - key: SERVE_FAR_POSE_ENABLED
        value: "0"

      - key: S3_BUCKET
        sync: false
      - key: S3_PREFIX
        value: "wix-uploads"
      - key: AWS_REGION
        value: "us-east-1"
      - key: BATCH_REGION
        value: "eu-north-1"
      - key: S3_GET_EXPIRES
        value: "604800"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: INGEST_WORKER_BASE_URL
        value: "https://ingest-worker.onrender.com"
      - key: INGEST_WORKER_OPS_KEY
        sync: false

      - key: VIDEO_WORKER_BASE_URL
        value: "https://video-worker.onrender.com"
      - key: VIDEO_WORKER_OPS_KEY
        sync: false

      - key: WIX_NOTIFY_UPLOAD_COMPLETE_URL
        sync: false
      - key: RENDER_TO_WIX_OPS_KEY
        sync: false

      - key: CLIENT_API_KEY
        sync: false

      # Silver serve source. 'auto' inherits SportAI's bronze `serve` flag
      # (RULE #1 — bronze owns the fact) but falls back to the geometric gate
      # when SA's flag has obviously collapsed. Measured agreement: 96%/92% on
      # healthy matches vs 5.8% on the one camera-setup video the geometric
      # gate was built for. Rollback: set to "geometric".
      - key: SILVER_SERVE_SOURCE
        value: "auto"

  # =========================================
  # 2) Ingest worker service
  # =========================================
  - type: web
    name: ingest-worker
    env: python
    pythonVersion: 3.12.3
    plan: starter
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn ingest_worker_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 3600"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: INGEST_WORKER_OPS_KEY
        sync: false

      - key: OPS_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

      - key: SPORT_AI_TOKEN
        sync: false
      - key: SPORT_AI_BASE
        value: "https://api.sportai.com"

      - key: S3_BUCKET
        sync: false
      - key: S3_PREFIX
        value: "wix-uploads"
      - key: AWS_REGION
        value: "us-east-1"
      - key: S3_GET_EXPIRES
        value: "604800"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      - key: WIX_NOTIFY_UPLOAD_COMPLETE_URL
        sync: false
      - key: RENDER_TO_WIX_OPS_KEY
        sync: false

      - key: VIDEO_WORKER_BASE_URL
        value: "https://video-worker.onrender.com"
      - key: VIDEO_WORKER_OPS_KEY
        sync: false

      - key: VIDEO_TRIM_CALLBACK_URL
        sync: false

      - key: INGEST_REPLACE_EXISTING
        value: "1"

      # Must match the main API — this worker builds silver for SportAI
      # matches, so a mismatch would produce two different serve derivations
      # depending on which service happened to run the build.
      - key: SILVER_SERVE_SOURCE
        value: "auto"

  # =========================================
  # 4) Video trim worker service
  # =========================================
  - type: web
    name: video-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: VIDEO_WORKER_OPS_KEY
        sync: false

      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      - key: FFMPEG_BIN
        value: "ffmpeg"
      - key: FFPROBE_BIN
        value: "ffprobe"

      - key: VIDEO_TRIM_CALLBACK_TIMEOUT_S
        value: "20"

  # =========================================
  # 5) Locker Room dashboard (client-facing)
  # =========================================
  - type: web
    name: locker-room
    env: python
    pythonVersion: 3.12.3
    plan: starter
    buildCommand: "pip install --upgrade pip && pip install flask gunicorn"
    startCommand: "gunicorn locker_room_app:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      # The public marketing site is served by THIS locker-room service via
      # host-aware routing in locker_room_app.py (no separate paid service).
      # When www.ten-fifty5.com is connected to this service, `/` and `/pricing`
      # serve the marketing pages; on every other host the app is unchanged.
      # Defaults in code already cover www/apex; override only if hosts change.
      # - key: MARKETING_HOSTS
      #   value: "www.ten-fifty5.com,ten-fifty5.com"

      # --- Google tag (GA4) — organic measurement for the marketing site + blog. Injected by
      # locker_room_app._marketing_head into every served page's <head>. Value is PUBLIC (it
      # appears in page source), so committed INLINE here — NEVER blank: a blank committed value
      # gets re-clobbered to empty on every blueprint sync and silently darkens the tag (this
      # exact trap dark-ed the NextPoint tag for a week, 2026-07). GA4-only for now (no paid ads
      # for Ten-Fifty5 yet); GOOGLE_ADS_ID stays unset so no Ads tag renders.
      - key: GA4_MEASUREMENT_ID
        value: "G-4167EPFS34"   # GA4 property "Ten-Fifty5" (www.ten-fifty5.com web stream)

      # De-Wix auth (Phase 1) — the /login page (Clerk). Served by THIS service.
      # DARK: with AUTH_V2_ENABLED=0 /login shows a "being set up" notice and Wix
      # login stays the only door. To go live: set CLERK_PUBLISHABLE_KEY (pk_…),
      # set AUTH_V2_ENABLED=1, then point CTAs at /login. The publishable key is
      # public (browser-side by design). AUTH_AFTER_LOGIN_URL defaults to /portal.
      - key: AUTH_V2_ENABLED
        value: "1"          # ON: /login runs the Clerk widget (CTAs now point here — LIVE)
      - key: CLERK_PUBLISHABLE_KEY
        value: "pk_live_Y2xlcmsudGVuLWZpZnR5NS5jb20k"  # Clerk PRODUCTION (clerk.ten-fifty5.com); public by design
      - key: AUTH_AFTER_LOGIN_URL
        value: "/portal"
      # Backend that verifies the Clerk token from /login (the whoami check).
      - key: AUTH_API_BASE
        value: "https://api.nextpointtennis.com"
      # Optional Clerk JWT template name. Leave blank to use the default session
      # token (add the `email` claim via Configure -> Sessions -> Customize token).
      - key: CLERK_JWT_TEMPLATE
        value: ""
      # When Ten-Fifty5 is embedded as a child iframe (the NextPoint members area), these
      # parent origins are allowed to relay a Clerk token to us via postMessage. Empty ->
      # same-origin only. This is the client-side trust for the SSO embed; the server-side
      # trust is AUTH_ISSUERS on the API service above.
      - key: TF_TRUSTED_PARENT_ORIGINS
        value: "https://nextpointtennis.com,https://www.nextpointtennis.com"