name: bench

# Tier 3 of T5 autonomy infrastructure (docs/north_star.md).
#
# Runs `python -m ml_pipeline.diag.bench` against the committed CI fixture
# (ml_pipeline/fixtures_ci/a798eff0.pkl.gz) on every push to main and every
# PR. Bench replays prod serve_detector logic and compares to the locked
# baseline at ml_pipeline/diag/bench_baseline.json — currently 20/24 on
# a798eff0. The job exits non-zero on any regression (bench's own exit
# code), so the GitHub check fails and the PR is blocked.
#
# What this catches: silent serve_detector regressions before review. Three
# prior commits (notably the 0cb645a one-shot threshold change) lost PASS
# count without local bench validation; this prevents that landing again.
#
# What this does NOT do: rerun Batch, validate court/ball detection,
# touch the DB. Bench is offline and replay-only by design (.claude/handover_t5.md
# §"TEST HARNESS").

"on":
  push:
    branches: [main]
    paths:
      - 'ml_pipeline/serve_detector/**'
      - 'ml_pipeline/diag/bench.py'
      - 'ml_pipeline/diag/replay_serves.py'
      - 'ml_pipeline/diag/bench_baseline.json'
      - 'ml_pipeline/diag/requirements-bench.txt'
      - 'ml_pipeline/fixtures_ci/**'
      - 'build_silver_v2.py'
      - '.github/workflows/bench.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ml_pipeline/serve_detector/**'
      - 'ml_pipeline/diag/bench.py'
      - 'ml_pipeline/diag/replay_serves.py'
      - 'ml_pipeline/diag/bench_baseline.json'
      - 'ml_pipeline/diag/requirements-bench.txt'
      - 'ml_pipeline/fixtures_ci/**'
      - 'build_silver_v2.py'
      - '.github/workflows/bench.yml'

jobs:
  bench:
    name: serve_detector bench (a798eff0 20/24)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'
          cache: 'pip'
          cache-dependency-path: 'ml_pipeline/diag/requirements-bench.txt'

      - name: Install bench-only deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/diag/requirements-bench.txt

      - name: Show environment
        run: |
          python --version
          pip list

      - name: Run bench against committed CI fixture
        # bench.py exits non-zero on any negative delta vs bench_baseline.json,
        # which is what fails the GitHub check.
        run: |
          python -m ml_pipeline.diag.bench --fixtures-dir ml_pipeline/fixtures_ci
