// Get return outcomes from shot_placement grouped by a key field
function getReturnOutcomes(playerRole, groupKey) {
  const shots = rowsForRole(selectedData.placement || [], playerRole)
    .filter(s => s.shot_phase_d === 'Return');
  const groups = {};
  shots.forEach(s => {
    const key = s[groupKey] || 'Unknown';
    if (!groups[key]) groups[key] = { error: 0, inPlay: 0, winner: 0 };
    if (s.shot_outcome_d === 'Error')  groups[key].error++;
    else if (s.shot_outcome_d === 'Winner') groups[key].winner++;
    else groups[key].inPlay++;
  });
  return groups;
}

// Build a stacked bar chart showing Error/InPlay/Winner per category key
function renderReturnOutcomeStackedBar(chartId, playerRole, groupKey) {
  const groups = getReturnOutcomes(playerRole, groupKey);
  const keys = Object.keys(groups).sort();
  if (!keys.length) return;
  eStackedBar(chartId, keys, [
    { name: 'Error',   data: keys.map(k => groups[k].error),  color: C_RED   },
    { name: 'In Play', data: keys.map(k => groups[k].inPlay), color: C_BLUE  },
    { name: 'Winner',  data: keys.map(k => groups[k].winner), color: C_GREEN },
  ]);
}

// Build serve direction outcome stacked bar (Won vs Lost) from serve_breakdown
function renderServeDirOutcomeBar(chartId, playerRole) {
  const rows = rowsForRole(selectedData.serve || [], playerRole);
  const dirMap = { wide: 'Wide', body: 'Body', t: 'T' };
  const agg = {};
  rows.forEach(r => {
    const d = dirMap[(r.serve_bucket_d||'').toLowerCase()] || 'Unknown';
    if (!agg[d]) agg[d] = { won: 0, lost: 0, unret: 0 };
    agg[d].won  += r.points_won    || 0;
    agg[d].lost += ((r.points_played || 0) - (r.points_won || 0));
    agg[d].unret += r.unreturned   || 0;
  });
  const dirs = ['Wide', 'Body', 'T'].filter(d => agg[d] && (agg[d].won + agg[d].lost) > 0);
  if (!dirs.length) return;
  eStackedBar(chartId, dirs, [
    { name: 'Won',  data: dirs.map(d => agg[d].won),  color: C_GREEN },
    { name: 'Lost', data: dirs.map(d => agg[d].lost), color: C_RED   },
  ]);
}

// Build serve direction unreturned bar from serve_breakdown
function renderServeUnretBar(chartId, playerRole) {
  const rows = rowsForRole(selectedData.serve || [], playerRole);
  const dirMap = { wide: 'Wide', body: 'Body', t: 'T' };
  const agg = {};
  rows.forEach(r => {
    const d = dirMap[(r.serve_bucket_d||'').toLowerCase()] || 'Unknown';
    if (!agg[d]) agg[d] = { unret: 0, total: 0 };
    agg[d].unret += r.unreturned   || 0;
    agg[d].total += r.points_played || 0;
  });
  const dirs = ['Wide', 'Body', 'T'].filter(d => agg[d] && agg[d].total > 0);
  if (!dirs.length) return;
  const chart = ec(chartId);
  if (!chart) return;
  chart.setOption({
    ...ANIM, tooltip: TT,
    grid: { left: 40, right: 40, top: 20, bottom: 35, containLabel: true },
    xAxis: {
      type: 'category', data: dirs,
      axisLabel: { fontSize: 13, color: '#6b7280' }, axisTick: { show: false },
      axisLine: { lineStyle: { color: '#e5e5e5' } },
    },
    yAxis: {
      type: 'value', minInterval: 1,
      axisLabel: { fontSize: 12, color: '#9ca3af' },
      splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
      axisLine: { show: false }, axisTick: { show: false },
    },
    series: [{
      type: 'bar', barWidth: '55%',
      data: dirs.map(d => agg[d].unret),
      itemStyle: { color: C_TEAL, borderRadius: [6, 6, 0, 0] },
      label: {
        show: true, position: 'top', fontSize: 12, fontWeight: 600,
        formatter: (p) => {
          const t = agg[dirs[p.dataIndex]].total;
          const pct = t > 0 ? Math.round(100 * p.value / t) : 0;
          return p.value + ' (' + pct + '%)';
        },
        color: '#374151',
      },
    }],
  });
  CI[chartId] = chart;
}

// Build serve 1st/2nd try bar showing In% and Win% grouped per direction
function renderServeTryBar(chartId, playerRole, tryVal) {
  const rows = rowsForRole(selectedData.serve || [], playerRole)
    .filter(r => r.serve_try_ix_in_point === tryVal);
  const dirMap = { wide: 'Wide', body: 'Body', t: 'T' };
  const agg = {};
  rows.forEach(r => {
    const d = dirMap[(r.serve_bucket_d||'').toLowerCase()] || 'Unknown';
    if (!agg[d]) agg[d] = { count: 0, inCount: 0, won: 0, played: 0 };
    agg[d].count   += r.serve_count   || 0;
    agg[d].inCount += r.serves_in     || 0;
    agg[d].won     += r.points_won    || 0;
    agg[d].played  += r.points_played || 0;
  });
  const dirs = ['Wide', 'Body', 'T'].filter(d => agg[d] && agg[d].count > 0);
  if (!dirs.length) return;
  const chart = ec(chartId);
  if (!chart) return;
  chart.setOption({
    ...ANIM, tooltip: TT,
    legend: { bottom: 0, textStyle: { fontSize: 12 }, itemGap: 16, icon: 'roundRect' },
    grid: { left: 40, right: 30, top: 20, bottom: 50, containLabel: true },
    xAxis: {
      type: 'category', data: dirs,
      axisLabel: { fontSize: 13, color: '#6b7280' }, axisTick: { show: false },
      axisLine: { lineStyle: { color: '#e5e5e5' } },
    },
    yAxis: {
      type: 'value', max: 100,
      axisLabel: { fontSize: 12, color: '#9ca3af', formatter: '{value}%' },
      splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
      axisLine: { show: false }, axisTick: { show: false },
    },
    series: [
      {
        type: 'bar', name: 'In %', barWidth: '25%', barGap: '20%',
        data: dirs.map(d => agg[d].count > 0 ? Math.round(100 * agg[d].inCount / agg[d].count) : 0),
        itemStyle: { color: C_BLUE, borderRadius: [6, 6, 0, 0] },
        label: { show: true, position: 'top', fontSize: 11, fontWeight: 600, color: '#374151',
          formatter: (p) => p.value + '%' },
      },
      {
        type: 'bar', name: 'Win %', barWidth: '25%',
        data: dirs.map(d => agg[d].played > 0 ? Math.round(100 * agg[d].won / agg[d].played) : 0),
        itemStyle: { color: C_GREEN, borderRadius: [6, 6, 0, 0] },
        label: { show: true, position: 'top', fontSize: 11, fontWeight: 600, color: '#374151',
          formatter: (p) => p.value + '%' },
      },
    ],
  });
  CI[chartId] = chart;
}

// ====================================================================
//  ECHARTS RENDERING
// ====================================================================
function destroyCharts() {
  Object.values(CI).forEach(c => { try { c.dispose(); } catch(e) {} });
  Object.keys(CI).forEach(k => delete CI[k]);
}

function ec(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  const existing = echarts.getInstanceByDom(el);
  if (existing) existing.dispose();
  return echarts.init(el);
}

const TT = {
  trigger: 'axis', axisPointer: { type: 'shadow', shadowStyle: { color: 'rgba(0,0,0,0.04)' } },
  backgroundColor: 'rgba(255,255,255,0.96)', borderColor: '#e5e5e5', borderWidth: 1,
  textStyle: { color: '#1a1a1a', fontSize: 13 }, padding: [10, 14],
};
const TT_ITEM = {
  trigger: 'item',
  backgroundColor: 'rgba(255,255,255,0.96)', borderColor: '#e5e5e5', borderWidth: 1,
  textStyle: { color: '#1a1a1a', fontSize: 13 }, padding: [10, 14],
};
const ANIM = { animationDuration: 800, animationEasing: 'elasticOut', animationDelay: (idx) => idx * 50 };

function eBar(id, labels, data, colors, horizontal = false) {
  const chart = ec(id);
  if (!chart) return null;
  const isMultiColor = Array.isArray(colors);
  chart.setOption({
    ...ANIM, tooltip: TT,
    grid: { left: horizontal ? 80 : 40, right: 30, top: 30, bottom: 35, containLabel: true },
    [horizontal ? 'yAxis' : 'xAxis']: {
      type: 'category', data: labels,
      axisLabel: { fontSize: 13, color: '#6b7280' },
      axisLine: { lineStyle: { color: '#e5e5e5' } },
      axisTick: { show: false },
    },
    [horizontal ? 'xAxis' : 'yAxis']: {
      type: 'value', minInterval: 1,
      axisLabel: { fontSize: 12, color: '#9ca3af' },
      splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
      axisLine: { show: false }, axisTick: { show: false },
    },
    series: [{
      type: 'bar', barWidth: '55%',
      label: { show: true, position: horizontal ? 'right' : 'top', fontSize: 12, fontWeight: 600, color: '#374151' },
      data: data.map((v, i) => {
        const c = isMultiColor ? colors[i % colors.length] : colors;
        return {
          value: v,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: c.replace('0.7', '0.9').replace('0.75', '0.95') },
              { offset: 1, color: c },
            ]),
            borderRadius: horizontal ? [0, 6, 6, 0] : [6, 6, 0, 0],
          },
        };
      }),
      emphasis: { itemStyle: { shadowBlur: 12, shadowColor: 'rgba(0,0,0,0.15)' } },
    }],
  });
  CI[id] = chart;
  return chart;
}

function eStackedBar(id, labels, seriesData, horizontal = false) {
  const chart = ec(id);
  if (!chart) return null;
  chart.setOption({
    ...ANIM, tooltip: { ...TT, trigger: 'axis' },
    legend: { bottom: 0, textStyle: { fontSize: 13 }, itemGap: 20, icon: 'roundRect' },
    grid: { left: 40, right: 30, top: 20, bottom: 50, containLabel: true },
    [horizontal ? 'yAxis' : 'xAxis']: {
      type: 'category', data: labels,
      axisLabel: { fontSize: 13, color: '#6b7280' },
      axisLine: { lineStyle: { color: '#e5e5e5' } },
      axisTick: { show: false },
    },
    [horizontal ? 'xAxis' : 'yAxis']: {
      type: 'value', minInterval: 1,
      axisLabel: { fontSize: 12, color: '#9ca3af' },
      splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
      axisLine: { show: false }, axisTick: { show: false },
    },
    series: seriesData.map((s, si) => ({
      type: 'bar', name: s.name, stack: 'total', barWidth: '55%',
      data: s.data,
      itemStyle: {
        color: s.color,
        borderRadius: si === seriesData.length - 1 ? [6, 6, 0, 0] : 0,
      },
      emphasis: { focus: 'series', blurScope: 'coordinateSystem' },
      label: {
        show: true, position: 'inside', fontSize: 11, fontWeight: 600, color: '#fff',
        formatter: (p) => p.value > 0 ? p.value : '',
      },
    })),
  });
  CI[id] = chart;
  return chart;
}

function ePie(id, data, colors) {
  const chart = ec(id);
  if (!chart) return null;
  chart.setOption({
    ...ANIM, tooltip: TT_ITEM,
    legend: { bottom: 0, textStyle: { fontSize: 13 }, itemGap: 20, icon: 'circle' },
    series: [{
      type: 'pie', radius: ['45%', '75%'], center: ['50%', '45%'],
      padAngle: 3,
      itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
      label: {
        show: true,
        formatter: (p) => `{name|${p.name}}\n{pct|${p.percent.toFixed(0)}%}  {cnt|(${p.value})}`,
        rich: {
          name: { fontSize: 13, fontWeight: 600, color: '#374151', lineHeight: 20 },
          pct: { fontSize: 18, fontWeight: 700, color: '#1a5c2e', lineHeight: 24 },
          cnt: { fontSize: 12, color: '#9ca3af' },
        },
      },
      emphasis: {
        label: { fontSize: 15, fontWeight: 'bold' },
        itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.2)' },
        scaleSize: 8,
      },
      data: data.map((d, i) => ({ value: d.value, name: d.name, itemStyle: { color: colors[i] } })),
    }],
  });
  CI[id] = chart;
  return chart;
}

// Ring gauge — identical to practice.html (gold standard)
function eGauge(id, value, label, max, color) {
  const chart = ec(id);
  if (!chart) return null;
  chart.setOption({
    ...ANIM,
    series: [{
      type: 'gauge', startAngle: 220, endAngle: -40, min: 0, max: max,
      pointer: { show: false },
      progress: { show: true, width: 14, roundCap: true, itemStyle: { color } },
      axisLine: { lineStyle: { width: 14, color: [[1, 'rgba(0,0,0,0.08)']] } },
      axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
      title: { offsetCenter: [0, '70%'], fontSize: 12, color: '#6b7280' },
      detail: { offsetCenter: [0, '30%'], fontSize: 28, fontWeight: 700, color, formatter: '{value}' },
      data: [{ value, name: label }],
    }],
  });
  CI[id] = chart;
  return chart;
}

function renderAllCharts() {
  destroyCharts();
  if (activeModule === 'heatmaps') return;
  const k = kpi();
  const pa = k.player_a_name || 'Player A';
  const pb = k.player_b_name || 'Player B';

  // ===== SUMMARY TAB =====
  if (activeTab === 'summary') {
    // Points won by phase (Serve / Return / Rally) — from kpi directly
    if (document.getElementById('chartPhasePoints')) {
      const chart = ec('chartPhasePoints');
      chart.setOption({
        ...ANIM, tooltip: TT,
        legend: { bottom: 0, textStyle: { fontSize: 13 }, icon: 'roundRect' },
        grid: { left: 40, right: 30, top: 20, bottom: 50, containLabel: true },
        xAxis: { type: 'category', data: ['Serve', 'Return', 'Rally (5+)'],
          axisLabel: { fontSize: 13, color: '#6b7280' }, axisTick: { show: false },
          axisLine: { lineStyle: { color: '#e5e5e5' } }
        },
        yAxis: { type: 'value', minInterval: 1,
          axisLabel: { fontSize: 12, color: '#9ca3af' },
          splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
          axisLine: { show: false }, axisTick: { show: false },
        },
        series: [
          { type: 'bar', name: pa, barWidth: '25%', barGap: '20%',
            data: [k.pa_svc_pts_won || 0, k.pa_ret_pts_won || 0, k.pa_rally_pts_won || 0],
            itemStyle: { color: PA_COLOR, borderRadius: [6, 6, 0, 0] },
            label: { show: true, position: 'top', fontSize: 12, fontWeight: 600, color: PA_COLOR } },
          { type: 'bar', name: pb, barWidth: '25%',
            data: [k.pb_svc_pts_won || 0, k.pb_ret_pts_won || 0, k.pb_rally_pts_won || 0],
            itemStyle: { color: PB_COLOR, borderRadius: [6, 6, 0, 0] },
            label: { show: true, position: 'top', fontSize: 12, fontWeight: 600, color: PB_COLOR } },
        ],
      });
      CI['chartPhasePoints'] = chart;
    }

    // Shot outcome distribution
    if (document.getElementById('chartOutcomes')) {
      const rA = byRole(selectedData.rally, 'player_a') || {};
      const rB = byRole(selectedData.rally, 'player_b') || {};
      const aW = k.pa_winners || 0, aE = k.pa_errors || 0;
      const aI = Math.max(0, (rA.rally_shots || 0) - aW - aE);
      const bW = k.pb_winners || 0, bE = k.pb_errors || 0;
      const bI = Math.max(0, (rB.rally_shots || 0) - bW - bE);
      eStackedBar('chartOutcomes', [pa, pb], [
        { name: 'Winners', data: [aW, bW], color: C_GREEN },
        { name: 'Errors',  data: [aE, bE], color: C_RED   },
        { name: 'In Play', data: [aI, bI], color: C_BLUE  },
      ]);
    }

    // Free Points / Return Pts Won / Rally Pts Won donut pairs
    function miniDonut(idA, idB, aVal, aTotal, bVal, bTotal, winLabel, lossLabel) {
      for (const [chartId, val, total, color] of [
        [idA, aVal, aTotal, PA_COLOR],
        [idB, bVal, bTotal, PB_COLOR],
      ]) {
        const won = val || 0, lost = Math.max(0, (total || 0) - won);
        ePie(chartId, [
          { name: winLabel, value: won },
          { name: lossLabel, value: lost },
        ], [color, 'rgba(180,180,180,0.4)']);
      }
    }
    const svcA = k.pa_service_points || (k.pa_svc_pts_won || 0) + (k.pb_ret_pts_won || 0);
    const svcB = k.pb_service_points || (k.pb_svc_pts_won || 0) + (k.pa_ret_pts_won || 0);
    miniDonut('chartFreePoints_a', 'chartFreePoints_b',
      k.pa_unreturned_serves, svcA, k.pb_unreturned_serves, svcB, 'Unreturned', 'Returned');
    miniDonut('chartRetPtsWon_a', 'chartRetPtsWon_b',
      k.pa_ret_pts_won, svcB, k.pb_ret_pts_won, svcA, 'Won', 'Lost');
    const totalRallyPts = (k.pa_rally_pts_won || 0) + (k.pb_rally_pts_won || 0);
    miniDonut('chartRallyPtsWon_a', 'chartRallyPtsWon_b',
      k.pa_rally_pts_won, totalRallyPts, k.pb_rally_pts_won, totalRallyPts, 'Won', 'Lost');

    // Speed ring gauges
    const maxAll = Math.max(
      k.pa_serve_speed_max || 0, k.pb_serve_speed_max || 0,
      k.pa_first_serve_speed_max || 0, k.pb_first_serve_speed_max || 0,
      k.pa_second_serve_speed_max || 0, k.pb_second_serve_speed_max || 0,
      k.pa_fh_speed_max || 0, k.pb_fh_speed_max || 0,
      k.pa_bh_speed_max || 0, k.pb_bh_speed_max || 0, 100
    );
    const scale = Math.ceil(maxAll / 20) * 20;
    eGauge('gaugeSrvA', Math.round(k.pa_first_serve_speed_avg || k.pa_serve_speed_avg || 0), 'max ' + (k.pa_first_serve_speed_max || k.pa_serve_speed_max || '—'), scale, PA_COLOR);
    eGauge('gauge2ndA', Math.round(k.pa_second_serve_speed_avg || 0), 'max ' + (k.pa_second_serve_speed_max || '—'), scale, '#4a7c5c');
    eGauge('gaugeFhA',  Math.round(k.pa_fh_speed_avg  || 0), 'max ' + (k.pa_fh_speed_max  || '—'), scale, '#22783c');
    eGauge('gaugeBhA',  Math.round(k.pa_bh_speed_avg  || 0), 'max ' + (k.pa_bh_speed_max  || '—'), scale, '#2563eb');
    eGauge('gaugeSrvB', Math.round(k.pb_first_serve_speed_avg || k.pb_serve_speed_avg || 0), 'max ' + (k.pb_first_serve_speed_max || k.pb_serve_speed_max || '—'), scale, PB_COLOR);
    eGauge('gauge2ndB', Math.round(k.pb_second_serve_speed_avg || 0), 'max ' + (k.pb_second_serve_speed_max || '—'), scale, '#4a7c5c');
    eGauge('gaugeFhB',  Math.round(k.pb_fh_speed_avg  || 0), 'max ' + (k.pb_fh_speed_max  || '—'), scale, '#22783c');
    eGauge('gaugeBhB',  Math.round(k.pb_bh_speed_avg  || 0), 'max ' + (k.pb_bh_speed_max  || '—'), scale, '#2563eb');

    // In Attack % comparison bars
    for (const role of ['player_a', 'player_b']) {
      const r = byRole(selectedData.rally, role) || {};
      const total = (r.aggression_attack||0) + (r.aggression_neutral||0) + (r.aggression_defence||0);
      const sfx = role === 'player_a' ? 'a' : 'b';
      if (total > 0) {
        const chart = ec('chartAggBar_' + sfx);
        if (chart) {
          chart.setOption({
            ...ANIM,
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, ...TT },
            grid: { left: 0, right: 0, top: 0, bottom: 0 },
            xAxis: { type: 'value', max: 100, show: false },
            yAxis: { type: 'category', data: [''], show: false },
            series: [
              { type: 'bar', stack: 'total', name: 'Attack', data: [Math.round(100*r.aggression_attack/total)],
                itemStyle: { color: C_GREEN }, barWidth: '100%',
                label: { show: true, position: 'inside', fontSize: 12, fontWeight: 600, color: '#fff',
                  formatter: p => p.value > 5 ? 'Attack ' + p.value + '%' : '' } },
              { type: 'bar', stack: 'total', name: 'Neutral', data: [Math.round(100*r.aggression_neutral/total)],
                itemStyle: { color: C_AMBER }, barWidth: '100%',
                label: { show: true, position: 'inside', fontSize: 12, fontWeight: 600, color: '#fff',
                  formatter: p => p.value > 5 ? 'Neutral ' + p.value + '%' : '' } },
              { type: 'bar', stack: 'total', name: 'Defence', data: [Math.round(100*r.aggression_defence/total)],
                itemStyle: { color: C_RED }, barWidth: '100%',
                label: { show: true, position: 'inside', fontSize: 12, fontWeight: 600, color: '#fff',
                  formatter: p => p.value > 5 ? 'Defence ' + p.value + '%' : '' } },
            ],
          });
          CI['chartAggBar_' + sfx] = chart;
        }
      }
    }
  }

  // ===== SERVE PERFORMANCE TAB =====
  if (activeTab === 'serve-perf') {
    for (const role of ['player_a', 'player_b']) {
      const rows = rowsForRole(selectedData.serve, role);
      const dirCounts = { Wide: 0, Body: 0, T: 0 };
      const dirMap = { wide: 'Wide', body: 'Body', t: 'T' };
      rows.forEach(r => { const d = dirMap[(r.serve_bucket_d||'').toLowerCase()]; if (d) dirCounts[d] += r.serve_count || 0; });
      const dirs = ['Wide', 'Body', 'T'].filter(d => dirCounts[d] > 0);
      const sfx = role === 'player_a' ? 'a' : 'b';
      eBar('chartServeDir_' + sfx, dirs, dirs.map(d => dirCounts[d]), [C_BLUE, C_GREEN, C_AMBER], true);
      renderServeDirOutcomeBar('chartServeDirOut_' + sfx, role);
      renderServeUnretBar('chartServeUnret_' + sfx, role);
    }
  }

  // ===== SERVE DETAIL TAB =====
  if (activeTab === 'serve-detail') {
    for (const role of ['player_a', 'player_b']) {
      const sfx = role === 'player_a' ? 'a' : 'b';
      renderServeTryBar('chartServe1st_' + sfx, role, '1st');
      renderServeTryBar('chartServe2nd_' + sfx, role, '2nd');
    }
  }

  // ===== RETURN DETAIL TAB =====
  if (activeTab === 'return-detail') {
    for (const role of ['player_a', 'player_b']) {
      const r = byRole(selectedData.return, role) || {};
      const sfx = role === 'player_a' ? 'a' : 'b';

      eBar('chartRetDepth_' + sfx, ['Deep', 'Middle', 'Short'],
        [r.returns_deep || 0, r.returns_middle || 0, r.returns_short || 0],
        [C_GREEN, C_AMBER, C_RED]);

      ePie('chartRetStroke_' + sfx, [
        { name: 'Forehand', value: r.returns_forehand || 0 },
        { name: 'Backhand', value: r.returns_backhand || 0 },
      ], [C_GREEN, C_BLUE]);

      const inPlay = Math.max(0, (r.returns_made || 0) - (r.return_winners || 0));
      eBar('chartRetOutcome_' + sfx, ['Winner', 'In Play', 'Error'],
        [r.return_winners || 0, inPlay, r.return_errors || 0],
        [C_GREEN, C_BLUE, C_RED]);

      // New cross-tab charts from shot_placement
      renderReturnOutcomeStackedBar('chartRetByTry_' + sfx,       role, 'serve_try_ix_in_point');
      renderReturnOutcomeStackedBar('chartRetByStroke_' + sfx,    role, 'stroke_d');
      renderReturnOutcomeStackedBar('chartRetByServeLoc_' + sfx,  role, 'serve_bucket_d');
    }
  }

  // ===== RALLY DETAIL TAB =====
  if (activeTab === 'rally-detail') {
    const lenRows = (selectedData.rallyLength || []).slice()
      .sort((a, b) => (a.rally_length_point || 0) - (b.rally_length_point || 0));
    eBar('chartRallyLen',
      lenRows.map(r => r.rally_length_point + ' shots'),
      lenRows.map(r => r.points || 0), C_GREEN);

    const buckets = ['Short (1-4)', 'Medium (5-8)', 'Long (9+)'];
    const paWins = [0, 0, 0], pbWins = [0, 0, 0];
    (selectedData.rallyLength || []).forEach(r => {
      const i = buckets.indexOf(r.length_bucket);
      if (i >= 0) { paWins[i] += r.pa_points_won || 0; pbWins[i] += r.pb_points_won || 0; }
    });
    if (document.getElementById('chartRallyBucketWin')) {
      const chart = ec('chartRallyBucketWin');
      chart.setOption({
        ...ANIM, tooltip: TT,
        legend: { bottom: 0, textStyle: { fontSize: 13 }, icon: 'roundRect' },
        grid: { left: 40, right: 30, top: 20, bottom: 50, containLabel: true },
        xAxis: { type: 'category', data: buckets,
          axisLabel: { fontSize: 13, color: '#6b7280' }, axisTick: { show: false },
          axisLine: { lineStyle: { color: '#e5e5e5' } } },
        yAxis: { type: 'value', minInterval: 1,
          axisLabel: { fontSize: 12, color: '#9ca3af' },
          splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
          axisLine: { show: false }, axisTick: { show: false } },
        series: [
          { type: 'bar', name: pa, barWidth: '25%', barGap: '20%',
            data: paWins, itemStyle: { color: PA_COLOR, borderRadius: [6, 6, 0, 0] },
            label: { show: true, position: 'top', fontSize: 12, fontWeight: 600, color: PA_COLOR } },
          { type: 'bar', name: pb, barWidth: '25%',
            data: pbWins, itemStyle: { color: PB_COLOR, borderRadius: [6, 6, 0, 0] },
            label: { show: true, position: 'top', fontSize: 12, fontWeight: 600, color: PB_COLOR } },
        ],
      });
      CI['chartRallyBucketWin'] = chart;
    }

    for (const role of ['player_a', 'player_b']) {
      const r = byRole(selectedData.rally, role) || {};
      const sfx = role === 'player_a' ? 'a' : 'b';

      eBar('chartAgg_' + sfx, ['Attack', 'Neutral', 'Defence'],
        [r.aggression_attack || 0, r.aggression_neutral || 0, r.aggression_defence || 0],
        [C_GREEN, C_AMBER, C_RED], true);

      eBar('chartDepth_' + sfx, ['Deep', 'Middle', 'Short'],
        [r.depth_deep || 0, r.depth_middle || 0, r.depth_short || 0],
        [C_GREEN, C_AMBER, C_RED]);

      ePie('chartStroke_' + sfx, [
        { name: 'Forehand', value: r.stroke_forehand || 0 },
        { name: 'Backhand', value: r.stroke_backhand || 0 },
      ], [C_GREEN, C_BLUE]);

      // Rally outcome donut
      const rW = r.winners || 0, rE = r.errors || 0;
      const rI = Math.max(0, (r.rally_shots || 0) - rW - rE);
      ePie('chartRallyOutcome_' + sfx, [
        { name: 'Winner', value: rW },
        { name: 'Error',  value: rE },
        { name: 'In Play',value: rI },
      ], [C_GREEN, C_RED, C_BLUE]);
    }
  }

  // ===== POINT ANALYSIS TAB =====
  if (activeTab === 'point-analysis') {
    const k2 = kpi();
    const rA2 = byRole(selectedData.rally, 'player_a') || {};
    const placement = selectedData.placement || [];
    const ownerId = k2.player_a_id;
    const oppId   = k2.player_b_id;

    // How Player A won points: Aces, Winners, Opponent Errors
    const placementA = rowsForRole(placement, 'player_a');
    const placementB = rowsForRole(placement, 'player_b');

    // Points won by Player A
    const acesA    = k2.pa_aces || 0;
    const winnersA = k2.pa_winners || 0;
    // Opponent errors that gave Player A the point: Player B shots where outcome=Error and point winner = A
    const oppErrGivingA = placementB.filter(s =>
      s.shot_outcome_d === 'Error' && s.point_winner_player_id === ownerId
    ).length;
    const wonByA = (k2.pa_points_won || 0);

    if (document.getElementById('chartPAWon')) {
      ePie('chartPAWon', [
        { name: 'Aces', value: acesA },
        { name: 'Winners', value: Math.max(0, winnersA - acesA) },
        { name: 'Opp Errors', value: oppErrGivingA },
        { name: 'Other', value: Math.max(0, wonByA - acesA - Math.max(0, winnersA - acesA) - oppErrGivingA) },
      ].filter(d => d.value > 0), [C_GREEN, C_GREEN_L, C_AMBER, C_TEAL]);
    }

    // How Player A lost points: DFs, Own Errors, Opponent Winners
    const dfA      = k2.pa_double_faults || 0;
    const errorsA  = k2.pa_errors || 0;
    // Opponent winners that beat Player A
    const oppWinnersBeatingA = placementB.filter(s =>
      s.shot_outcome_d === 'Winner' && s.point_winner_player_id === oppId
    ).length;
    const lostByA  = k2.pb_points_won || 0;

    if (document.getElementById('chartPALost')) {
      ePie('chartPALost', [
        { name: 'Double Faults', value: dfA },
        { name: 'Own Errors',    value: Math.max(0, errorsA - dfA) },
        { name: 'Opp Winners',   value: oppWinnersBeatingA },
        { name: 'Other',         value: Math.max(0, lostByA - dfA - Math.max(0, errorsA - dfA) - oppWinnersBeatingA) },
      ].filter(d => d.value > 0), [C_RED, '#e57373', C_BLUE, C_AMBER]);
    }
  }

  // Resize handler (idempotent — add once)
  if (!renderAllCharts._resizeAdded) {
    window.addEventListener('resize', () => {
      Object.values(CI).forEach(c => { try { c.resize(); } catch(e) {} });
    });
    renderAllCharts._resizeAdded = true;
  }
}

// ==================== VIDEO ====================
function playFootage(taskId) {
  apiFetch('/api/client/footage-url/' + taskId).then(r => r.json()).then(data => {
    if (!data.ok || !data.url) { alert('Footage not available.'); return; }
    document.getElementById('videoPlayer').src = data.url;
    document.getElementById('videoModal').classList.add('open');
    document.getElementById('videoPlayer').play();
  }).catch(e => alert('Error: ' + e.message));
}
function closeVideo() {
  document.getElementById('videoPlayer').pause();
  document.getElementById('videoPlayer').src = '';
  document.getElementById('videoModal').classList.remove('open');
}

init();
</script>
</body>
</html>
